<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家計簿アプリ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f7f6f3;--surface:#fff;--border:rgba(0,0,0,.1);--text:#1a1a1a;--muted:#888;--income:#0F6E56;--expense:#993C1D;--inc-bg:#E1F5EE;--exp-bg:#FAECE7;--r:12px;--rs:8px}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:480px;margin:0 auto;padding:1.5rem 1rem 4rem}
header{margin-bottom:1.5rem}
header h1{font-size:22px;font-weight:700}
header p{font-size:13px;color:var(--muted);margin-top:2px}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.metric{background:var(--surface);border-radius:var(--r);padding:14px 12px;border:.5px solid var(--border)}
.metric-label{font-size:11px;color:var(--muted);margin-bottom:6px}
.metric-value{font-size:18px;font-weight:700}
.metric-value.income{color:var(--income)}.metric-value.expense{color:var(--expense)}
.metric-value.pos{color:var(--income)}.metric-value.neg{color:var(--expense)}
.tabs{display:flex;background:var(--surface);border-radius:var(--r);padding:4px;margin-bottom:1.5rem;border:.5px solid var(--border)}
.tab{flex:1;padding:8px 4px;border:none;background:none;cursor:pointer;font-size:12px;font-family:inherit;color:var(--muted);border-radius:calc(var(--r) - 4px);transition:background .15s,color .15s}
.tab.active{background:var(--bg);color:var(--text);font-weight:500}
.page{display:none}.page.active{display:block}
.sec{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.type-toggle{display:flex;border:.5px solid var(--border);border-radius:var(--rs);overflow:hidden;margin-bottom:14px}
.type-btn{flex:1;padding:10px;border:none;background:none;cursor:pointer;font-size:14px;font-family:inherit;color:var(--muted)}
.type-btn.active.expense{background:var(--exp-bg);color:var(--expense);font-weight:700}
.type-btn.active.income{background:var(--inc-bg);color:var(--income);font-weight:700}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.fg input,.fg select{width:100%;padding:10px 12px;border:.5px solid var(--border);border-radius:var(--rs);font-size:15px;font-family:inherit;background:var(--surface);color:var(--text);outline:none}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.submit-btn{width:100%;padding:12px;margin-top:6px;background:var(--text);color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
.filter-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.filter-row .sec{margin-bottom:0;flex-shrink:0}
.filter-spacer{flex:1}
.filter-label{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap}
.filter-select{padding:5px 8px;border:.5px solid var(--border);border-radius:var(--rs);font-size:12px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;cursor:pointer;max-width:155px}
.tx-list{display:flex;flex-direction:column;gap:8px}
.tx-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--surface);border:.5px solid var(--border);border-radius:var(--r)}
.tx-left{display:flex;align-items:center;gap:10px}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tx-desc{font-size:14px;font-weight:500}
.tx-meta{font-size:11px;color:var(--muted);margin-top:2px}
.tx-right{display:flex;align-items:center;gap:6px}
.tx-amount{font-size:15px;font-weight:700}
.tx-amount.income{color:var(--income)}.tx-amount.expense{color:var(--expense)}
.tx-edit,.tx-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:2px 4px}
.empty{text-align:center;color:var(--muted);font-size:14px;padding:2.5rem 0}
.budget-input-area{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-bottom:1.5rem;align-items:end}
.budget-input-area input,.budget-input-area select{padding:9px 10px;border:.5px solid var(--border);border-radius:var(--rs);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);outline:none}
.budget-set-btn{padding:9px 14px;background:var(--text);color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap}
.budget-list{display:flex;flex-direction:column;gap:10px}
.budget-item{padding:14px;background:var(--surface);border:.5px solid var(--border);border-radius:var(--r)}
.budget-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.budget-cat-name{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500}
.budget-amounts{font-size:12px;color:var(--muted)}
.budget-amounts b{color:var(--text)}
.progress-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px}
.alert-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--exp-bg);color:var(--expense);margin-left:6px}
.bar-chart-wrap{margin-bottom:1.5rem}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:160px}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-pair{display:flex;gap:3px;align-items:flex-end;width:100%}
.bar{flex:1;border-radius:3px 3px 0 0;min-height:2px}
.bar.inc{background:#1D9E75}.bar.exp{background:#D85A30}
.bar-label{font-size:10px;color:var(--muted)}
.chart-legend{display:flex;gap:16px;margin-top:10px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.legend-dot{width:10px;height:10px;border-radius:2px}
.cat-breakdown{display:flex;flex-direction:column;gap:8px}
.cat-row{display:flex;align-items:center;gap:10px}
.cat-name{font-size:12px;min-width:70px;color:var(--muted)}
.cat-bar-wrap{flex:1;height:7px;background:var(--bg);border-radius:4px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:4px}
.cat-amount{font-size:12px;font-weight:700;min-width:65px;text-align:right}
.advice-box{margin-top:1.5rem;padding:14px 16px;background:var(--surface);border:.5px solid var(--border);border-radius:var(--r)}
.advice-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.advice-title{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.advice-btn{padding:6px 14px;background:var(--text);color:#fff;border:none;border-radius:var(--rs);font-size:12px;font-weight:700;font-family:inherit;cursor:pointer}
.advice-content{font-size:14px;line-height:1.75;color:var(--text);white-space:pre-wrap}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--r);padding:1.5rem;width:90%;max-width:420px}
.modal h2{font-size:16px;font-weight:700;margin-bottom:1rem}
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:1rem}
.btn-cancel{padding:10px;border:.5px solid var(--border);border-radius:var(--rs);background:none;font-size:14px;font-family:inherit;cursor:pointer;color:var(--muted)}
.btn-save{padding:10px;border:none;border-radius:var(--rs);background:var(--text);color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>家計簿</h1>
    <p id="current-date"></p>
  </header>
  <div class="summary-grid">
    <div class="metric"><div class="metric-label">収入（累計）</div><div class="metric-value income" id="total-income">¥0</div></div>
    <div class="metric"><div class="metric-label">支出（累計）</div><div class="metric-value expense" id="total-expense">¥0</div></div>
    <div class="metric"><div class="metric-label">残高（累計）</div><div class="metric-value" id="total-balance">¥0</div></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('home')">ホーム</button>
    <button class="tab" onclick="switchTab('add')">記録</button>
    <button class="tab" onclick="switchTab('budget')">予算</button>
    <button class="tab" onclick="switchTab('stats')">統計</button>
  </div>
  <!-- 編集モーダル -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <h2>取引を編集</h2>
      <div class="type-toggle">
        <button class="type-btn active expense" id="edit-btn-expense" onclick="setEditType('expense')">支出</button>
        <button class="type-btn" id="edit-btn-income" onclick="setEditType('income')">収入</button>
      </div>
      <div class="fr">
        <div class="fg"><label>金額（円）</label><input type="number" id="edit-amount" min="0"></div>
        <div class="fg"><label>日付</label><input type="date" id="edit-date"></div>
      </div>
      <div class="fr">
        <div class="fg"><label>カテゴリ</label><select id="edit-cat"></select></div>
        <div class="fg"><label>メモ</label><input type="text" id="edit-desc" placeholder="任意"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeEditModal()">キャンセル</button>
        <button class="btn-save" onclick="saveEdit()">保存する</button>
      </div>
    </div>
  </div>
  <!-- ホーム -->
  <div id="page-home" class="page active">
    <div class="filter-row">
      <span class="sec">最近の取引</span>
      <div class="filter-spacer"></div>
      <span class="filter-label">年月</span>
      <select class="filter-select" id="month-filter" onchange="renderFiltered()"></select>
    </div>
    <div class="tx-list" id="recent-list"><div class="empty">まだ取引がありません</div></div>
  </div>
  <!-- 記録 -->
  <div id="page-add" class="page">
    <div class="type-toggle">
      <button class="type-btn active expense" id="btn-expense" onclick="setType('expense')">支出</button>
      <button class="type-btn" id="btn-income" onclick="setType('income')">収入</button>
    </div>
    <div class="fr">
      <div class="fg"><label>金額（円）</label><input type="number" id="input-amount" placeholder="0" min="0"></div>
      <div class="fg"><label>日付</label><input type="date" id="input-date"></div>
    </div>
    <div class="fr">
      <div class="fg"><label>カテゴリ</label><select id="input-cat"></select></div>
      <div class="fg"><label>メモ</label><input type="text" id="input-desc" placeholder="任意"></div>
    </div>
    <button class="submit-btn" onclick="addTransaction()">記録する</button>
  </div>
  <!-- 予算 -->
  <div id="page-budget" class="page">
    <div class="sec">予算設定</div>
    <div class="budget-input-area">
      <select id="budget-cat-sel"></select>
      <input type="number" id="budget-amount-input" placeholder="金額（円）">
      <button class="budget-set-btn" onclick="setBudget()">設定</button>
    </div>
    <div class="budget-list" id="budget-list"><div class="empty">予算が設定されていません</div></div>
  </div>
  <!-- 統計 -->
  <div id="page-stats" class="page">
    <div class="sec">月別収支（過去6ヶ月）</div>
    <div class="bar-chart-wrap">
      <div class="bar-chart" id="monthly-chart"></div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div>収入</div>
        <div class="legend-item"><div class="legend-dot" style="background:#D85A30"></div>支出</div>
      </div>
    </div>
    <div class="sec" id="cat-label">カテゴリ別支出（今月）</div>
    <div class="cat-breakdown" id="cat-breakdown"><div class="empty">データがありません</div></div>
    <div class="advice-box">
      <div class="advice-header">
        <span class="advice-title">AIアドバイス</span>
        <button class="advice-btn" onclick="fetchAdvice()">アドバイスを表示</button>
      </div>
      <div class="filter-row" style="margin-bottom:10px">
        <span class="filter-label">年月</span>
        <select class="filter-select" id="advice-month-filter" onchange="updateCatSection()"></select>
      </div>
      <div class="advice-content" id="advice-content">年月を選んで「アドバイスを表示」を押してください。</div>
    </div>
  </div>
</div>
<script>
var CAT_EXPENSE = ['食費','交通費','通信費','光熱費','住居費','医療費','娯楽','衣服','日用品','CD','その他'];
var CAT_INCOME  = ['給料','副業','AD','その他収入'];
var CAT_COLORS  = {
  '食費':'#1D9E75','交通費':'#185FA5','通信費':'#534AB7','光熱費':'#BA7517','住居費':'#3C3489',
  '医療費':'#D85A30','娯楽':'#D4537E','衣服':'#639922','日用品':'#888780','CD':'#5F5E5A',
  'その他':'#888','給料':'#1D9E75','副業':'#0F6E56','AD':'#185FA5','その他収入':'#3C3489'
};
var txType = 'expense';
var data = { transactions: [], budgets: {} };

function load() {
  try { var s = localStorage.getItem('kakeibo_data'); if (s) data = JSON.parse(s); } catch(e) {}
  init();
}
function save() {
  try { localStorage.setItem('kakeibo_data', JSON.stringify(data)); } catch(e) {}
}
function fmt(n) { return '¥' + Math.round(n).toLocaleString('ja-JP'); }
function currentMonth() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function prevMonth(key) {
  var parts = key.split('-');
  var y = parseInt(parts[0]), m = parseInt(parts[1]);
  var d = new Date(y, m - 2, 1);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function pctChange(curr, prev) {
  if (!prev) return null;
  return Math.round((curr - prev) / prev * 100);
}
function pctLabel(pct, positiveIsGood) {
  if (pct === null) return '';
  if (pct === 0) return '（先月と同じ）';
  var improved = positiveIsGood ? pct > 0 : pct < 0;
  var sign = pct > 0 ? '+' : '';
  return improved ? '（先月比 ' + sign + pct + '% 改善）' : '（先月比 ' + sign + pct + '% 注意）';
}

function init() {
  var today = new Date();
  var hh = String(today.getHours()).padStart(2,'0');
  var mm = String(today.getMinutes()).padStart(2,'0');
  document.getElementById('current-date').textContent =
    today.getFullYear() + '年' + (today.getMonth()+1) + '月' + today.getDate() + '日 ' + hh + '：' + mm + '　現在';
  document.getElementById('input-date').value = today.toISOString().split('T')[0];
  populateCatSelects();
  buildMonthDropdowns();
  render();
}

function populateCatSelects() {
  var cats = txType === 'expense' ? CAT_EXPENSE : CAT_INCOME;
  document.getElementById('input-cat').innerHTML = cats.map(function(c){ return '<option>' + c + '</option>'; }).join('');
  document.getElementById('budget-cat-sel').innerHTML = CAT_EXPENSE.filter(function(c){ return c !== 'CD'; }).map(function(c){ return '<option>' + c + '</option>'; }).join('');
}

function makeMonthOptions(selectedVal) {
  var now = new Date();
  var cur = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  var html = '';
  for (var i = 0; i < 13; i++) {
    var d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    var key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    var lbl = d.getFullYear() + '年' + (d.getMonth()+1) + '月' + (key === cur ? '（今月）' : '');
    var sel = key === (selectedVal || cur) ? ' selected' : '';
    html += '<option value="' + key + '"' + sel + '>' + lbl + '</option>';
  }
  return html;
}

function buildMonthDropdowns() {
  var mf = document.getElementById('month-filter');
  var af = document.getElementById('advice-month-filter');
  if (mf) mf.innerHTML = makeMonthOptions(mf.value);
  if (af) af.innerHTML = makeMonthOptions(af.value);
}

function switchTab(name) {
  var tabs = ['home','add','budget','stats'];
  document.querySelectorAll('.tab').forEach(function(b, i) {
    b.classList.toggle('active', tabs[i] === name);
  });
  document.querySelectorAll('.page').forEach(function(p) {
    p.classList.remove('active');
  });
  document.getElementById('page-' + name).classList.add('active');
  if (name === 'stats') renderStats();
}

function setType(t) {
  txType = t;
  document.getElementById('btn-expense').className = 'type-btn' + (t==='expense' ? ' active expense' : '');
  document.getElementById('btn-income').className  = 'type-btn' + (t==='income'  ? ' active income'  : '');
  populateCatSelects();
}

function render() {
  var income  = data.transactions.filter(function(t){ return t.type==='income'; }).reduce(function(s,t){ return s+t.amount; }, 0);
  var expense = data.transactions.filter(function(t){ return t.type==='expense'; }).reduce(function(s,t){ return s+t.amount; }, 0);
  var bal = income - expense;
  document.getElementById('total-income').textContent  = fmt(income);
  document.getElementById('total-expense').textContent = fmt(expense);
  var bEl = document.getElementById('total-balance');
  bEl.textContent = fmt(bal);
  bEl.className = 'metric-value ' + (bal >= 0 ? 'pos' : 'neg');
  renderFiltered();
  renderBudget();
}

function renderFiltered() {
  var sel = document.getElementById('month-filter');
  if (!sel) return;
  var month = sel.value;
  var list = data.transactions
    .filter(function(t){ return t.date.startsWith(month); })
    .sort(function(a,b){ return b.date.localeCompare(a.date); });
  var el = document.getElementById('recent-list');
  el.innerHTML = list.length ? list.map(txHTML).join('') : '<div class="empty">この月の取引はありません</div>';
}

function txHTML(t) {
  return '<div class="tx-item">' +
    '<div class="tx-left">' +
      '<div class="dot" style="background:' + (CAT_COLORS[t.cat]||'#888') + '"></div>' +
      '<div>' +
        '<div class="tx-desc">' + (t.desc || t.cat) + '</div>' +
        '<div class="tx-meta">' + t.date + ' · ' + t.cat + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="tx-right">' +
      '<div class="tx-amount ' + t.type + '">' + (t.type==='income'?'+':'-') + fmt(t.amount) + '</div>' +
      '<button class="tx-edit" onclick="openEditModal(\'' + t.id + '\')" title="修正">✎</button>' +
      '<button class="tx-del"  onclick="deleteTx(\'' + t.id + '\')" title="削除">×</button>' +
    '</div>' +
  '</div>';
}

function renderBudget() {
  var month = currentMonth();
  var bycat = {};
  data.transactions.filter(function(t){ return t.date.startsWith(month) && t.type==='expense'; })
    .forEach(function(t){ bycat[t.cat] = (bycat[t.cat]||0) + t.amount; });
  var items = Object.entries(data.budgets);
  var el = document.getElementById('budget-list');
  if (!items.length) { el.innerHTML = '<div class="empty">予算が設定されていません</div>'; return; }
  el.innerHTML = items.map(function(entry) {
    var cat = entry[0], budget = entry[1];
    var spent = bycat[cat]||0;
    var pct = Math.min(100, Math.round(spent/budget*100));
    var over = spent > budget;
    var color = over ? '#D85A30' : pct>80 ? '#BA7517' : (CAT_COLORS[cat]||'#1D9E75');
    return '<div class="budget-item">' +
      '<div class="budget-header">' +
        '<div class="budget-cat-name">' +
          '<div class="dot" style="background:' + (CAT_COLORS[cat]||'#888') + '"></div>' +
          cat + (over ? '<span class="alert-tag">超過</span>' : '') +
        '</div>' +
        '<div class="budget-amounts">' + fmt(spent) + ' / <b>' + fmt(budget) + '</b></div>' +
      '</div>' +
      '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%;background:' + color + '"></div></div>' +
    '</div>';
  }).join('');
}

function renderStats() {
  buildMonthDropdowns();
  var now = new Date();
  var months = [];
  for (var i = 5; i >= 0; i--) {
    var d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    months.push({ key: d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'), label: (d.getMonth()+1)+'月' });
  }
  var maxVal = 1;
  months.forEach(function(m) {
    var tx = data.transactions.filter(function(t){ return t.date.startsWith(m.key); });
    var inc = tx.filter(function(t){ return t.type==='income'; }).reduce(function(s,t){ return s+t.amount; },0);
    var exp = tx.filter(function(t){ return t.type==='expense'; }).reduce(function(s,t){ return s+t.amount; },0);
    if (inc > maxVal) maxVal = inc;
    if (exp > maxVal) maxVal = exp;
  });
  document.getElementById('monthly-chart').innerHTML = months.map(function(m) {
    var tx = data.transactions.filter(function(t){ return t.date.startsWith(m.key); });
    var inc = tx.filter(function(t){ return t.type==='income'; }).reduce(function(s,t){ return s+t.amount; },0);
    var exp = tx.filter(function(t){ return t.type==='expense'; }).reduce(function(s,t){ return s+t.amount; },0);
    return '<div class="bar-group">' +
      '<div class="bar-pair">' +
        '<div class="bar inc" style="height:' + Math.round(inc/maxVal*140) + 'px" title="' + fmt(inc) + '"></div>' +
        '<div class="bar exp" style="height:' + Math.round(exp/maxVal*140) + 'px" title="' + fmt(exp) + '"></div>' +
      '</div>' +
      '<div class="bar-label">' + m.label + '</div>' +
    '</div>';
  }).join('');
  updateCatSection();
}

function updateCatSection() {
  var sel = document.getElementById('advice-month-filter');
  var month = sel ? sel.value : currentMonth();
  var parts = month.split('-');
  var cur = currentMonth();
  var lbl = month === cur ? '今月' : parts[0] + '年' + parseInt(parts[1]) + '月';
  document.getElementById('cat-label').textContent = 'カテゴリ別支出（' + lbl + '）';
  var catTotals = {};
  data.transactions.filter(function(t){ return t.date.startsWith(month) && t.type==='expense'; })
    .forEach(function(t){ catTotals[t.cat] = (catTotals[t.cat]||0) + t.amount; });
  var sorted = Object.entries(catTotals).sort(function(a,b){ return b[1]-a[1]; });
  var maxCat = sorted.length ? sorted[0][1] : 1;
  document.getElementById('cat-breakdown').innerHTML = sorted.length ? sorted.map(function(entry) {
    var cat = entry[0], amt = entry[1];
    return '<div class="cat-row">' +
      '<div class="cat-name">' + cat + '</div>' +
      '<div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:' + Math.round(amt/maxCat*100) + '%;background:' + (CAT_COLORS[cat]||'#888') + '"></div></div>' +
      '<div class="cat-amount">' + fmt(amt) + '</div>' +
    '</div>';
  }).join('') : '<div class="empty">データがありません</div>';
}

function fetchAdvice() {
  var sel = document.getElementById('advice-month-filter');
  var month = sel ? sel.value : currentMonth();
  var parts = month.split('-');
  var y = parts[0], mo = parts[1];
  var label = y + '年' + parseInt(mo) + '月';
  var prev = prevMonth(month);
  var pparts = prev.split('-');
  var prevLabel = pparts[0] + '年' + parseInt(pparts[1]) + '月';

  var monthTx    = data.transactions.filter(function(t){ return t.date.startsWith(month); });
  var prevTx     = data.transactions.filter(function(t){ return t.date.startsWith(prev); });
  var income     = monthTx.filter(function(t){ return t.type==='income'; }).reduce(function(s,t){ return s+t.amount; },0);
  var expense    = monthTx.filter(function(t){ return t.type==='expense'; }).reduce(function(s,t){ return s+t.amount; },0);
  var prevIncome = prevTx.filter(function(t){ return t.type==='income'; }).reduce(function(s,t){ return s+t.amount; },0);
  var prevExpense= prevTx.filter(function(t){ return t.type==='expense'; }).reduce(function(s,t){ return s+t.amount; },0);
  var el = document.getElementById('advice-content');

  if (!income && !expense) {
    el.textContent = label + 'のデータがありません。収入・支出を記録してからご確認ください。';
    return;
  }

  var catTotals = {}, prevCatTotals = {};
  monthTx.filter(function(t){ return t.type==='expense'; }).forEach(function(t){ catTotals[t.cat]=(catTotals[t.cat]||0)+t.amount; });
  prevTx.filter(function(t){ return t.type==='expense'; }).forEach(function(t){ prevCatTotals[t.cat]=(prevCatTotals[t.cat]||0)+t.amount; });
  var sortedCats = Object.entries(catTotals).sort(function(a,b){ return b[1]-a[1]; });
  var topCat = sortedCats[0];
  var bal = income - expense;
  var savingRate = income > 0 ? Math.round(bal/income*100) : 0;

  // 収入アドバイス
  var incomeLines = [];
  if (!income) {
    incomeLines.push(label + 'は収入の記録がありません。');
  } else {
    var iLine = label + 'の収入は' + fmt(income);
    var iPct = pctChange(income, prevIncome);
    if (prevIncome > 0) iLine += ' ' + pctLabel(iPct, true);
    iLine += '。';
    incomeLines.push(iLine);
    if (bal >= 0) {
      incomeLines.push('残高は' + fmt(bal) + '、貯蓄率は約' + savingRate + '%です。');
      if (savingRate >= 20) incomeLines.push('理想的な貯蓄ペースです！この調子を維持しましょう。');
      else if (savingRate >= 10) incomeLines.push('良いペースです。貯蓄率20%を目標にしてみましょう。');
      else incomeLines.push('貯蓄率10〜20%を目標に、支出を見直しましょう。');
    } else {
      incomeLines.push('支出が収入を' + fmt(Math.abs(bal)) + 'オーバーしています。収入アップか支出削減を検討しましょう。');
    }
  }

  // 支出アドバイス
  var expenseLines = [];
  if (!expense) {
    expenseLines.push(label + 'は支出の記録がありません。');
  } else {
    var eLine = label + 'の支出合計は' + fmt(expense);
    var ePct = pctChange(expense, prevExpense);
    if (prevExpense > 0) eLine += ' ' + pctLabel(ePct, false);
    eLine += '。';
    expenseLines.push(eLine);

    if (topCat) {
      var topRatio = Math.round(topCat[1]/expense*100);
      var tPct = pctChange(topCat[1], prevCatTotals[topCat[0]]||0);
      var tLine = '最も多い支出は「' + topCat[0] + '」で' + fmt(topCat[1]) + '（全体の' + topRatio + '%）';
      if (prevCatTotals[topCat[0]]) tLine += ' ' + pctLabel(tPct, false);
      tLine += '。';
      expenseLines.push(tLine);
    }

    var increased = Object.entries(catTotals)
      .map(function(e){ return { cat:e[0], amt:e[1], prev:prevCatTotals[e[0]]||0, pct:pctChange(e[1], prevCatTotals[e[0]]||0) }; })
      .filter(function(x){ return x.pct !== null && x.pct > 0 && x.prev > 0; })
      .sort(function(a,b){ return b.pct - a.pct; }).slice(0,2);
    if (increased.length) {
      expenseLines.push('先月より増加した支出：' + increased.map(function(x){ return '「' + x.cat + '」+' + x.pct + '%（' + fmt(x.prev) + '→' + fmt(x.amt) + '）'; }).join('、') + '。');
    }

    var decreased = Object.entries(catTotals)
      .map(function(e){ return { cat:e[0], amt:e[1], prev:prevCatTotals[e[0]]||0, pct:pctChange(e[1], prevCatTotals[e[0]]||0) }; })
      .filter(function(x){ return x.pct !== null && x.pct < 0 && x.prev > 0; })
      .sort(function(a,b){ return a.pct - b.pct; }).slice(0,2);
    if (decreased.length) {
      expenseLines.push('節約できた支出：' + decreased.map(function(x){ return '「' + x.cat + '」' + x.pct + '%（' + fmt(x.prev) + '→' + fmt(x.amt) + '）'; }).join('、') + '。');
    }

    if (income > 0) {
      var recommend = Math.round(income * 0.7);
      if (expense > recommend) expenseLines.push('支出が収入の70%超。目標は' + fmt(recommend) + '以内です！');
    }
  }

  var hasPrev = prevIncome > 0 || prevExpense > 0;
  var note = hasPrev ? '' : '\n※ ' + prevLabel + 'のデータがないため先月比は表示されません。';
  el.textContent = '【収入について】\n' + incomeLines.join('\n') + '\n\n【支出について】\n' + expenseLines.join('\n') + note;
}

function addTransaction() {
  var amount = parseFloat(document.getElementById('input-amount').value);
  var date   = document.getElementById('input-date').value;
  var cat    = document.getElementById('input-cat').value;
  var desc   = document.getElementById('input-desc').value.trim();
  if (!amount || amount <= 0 || !date) { alert('金額と日付を入力してください'); return; }
  data.transactions.push({ id: Date.now().toString(), type: txType, amount: amount, date: date, cat: cat, desc: desc });
  save();
  document.getElementById('input-amount').value = '';
  document.getElementById('input-desc').value = '';
  render();
  switchTab('home');
}

function deleteTx(id) {
  data.transactions = data.transactions.filter(function(t){ return t.id !== id; });
  save(); render();
}

var editingId = null;
var editTxType = 'expense';

function openEditModal(id) {
  var t = data.transactions.find(function(t){ return t.id === id; });
  if (!t) return;
  editingId = id;
  setEditType(t.type);
  document.getElementById('edit-amount').value = t.amount;
  document.getElementById('edit-date').value   = t.date;
  document.getElementById('edit-desc').value   = t.desc || '';
  populateEditCat(t.cat);
  document.getElementById('edit-modal').classList.add('open');
}

function populateEditCat(selectedCat) {
  var cats = editTxType === 'expense' ? CAT_EXPENSE : CAT_INCOME;
  document.getElementById('edit-cat').innerHTML = cats.map(function(c){
    return '<option' + (c===selectedCat ? ' selected' : '') + '>' + c + '</option>';
  }).join('');
}

function setEditType(t) {
  editTxType = t;
  document.getElementById('edit-btn-expense').className = 'type-btn' + (t==='expense' ? ' active expense' : '');
  document.getElementById('edit-btn-income').className  = 'type-btn' + (t==='income'  ? ' active income'  : '');
  populateEditCat('');
}

function closeEditModal() {
  editingId = null;
  document.getElementById('edit-modal').classList.remove('open');
}

function saveEdit() {
  var amount = parseFloat(document.getElementById('edit-amount').value);
  var date   = document.getElementById('edit-date').value;
  var cat    = document.getElementById('edit-cat').value;
  var desc   = document.getElementById('edit-desc').value.trim();
  if (!amount || amount <= 0 || !date) { alert('金額と日付を入力してください'); return; }
  var idx = data.transactions.findIndex(function(t){ return t.id === editingId; });
  if (idx !== -1) {
    data.transactions[idx] = Object.assign({}, data.transactions[idx], { type: editTxType, amount: amount, date: date, cat: cat, desc: desc });
  }
  save(); render(); closeEditModal();
}

function setBudget() {
  var cat = document.getElementById('budget-cat-sel').value;
  var amt = parseFloat(document.getElementById('budget-amount-input').value);
  if (!amt || amt <= 0) { alert('予算額を入力してください'); return; }
  data.budgets[cat] = amt;
  document.getElementById('budget-amount-input').value = '';
  save(); renderBudget();
}

load();
</script>
</body>
</html>
